<!DOCTYPE html>
<html lang="ko">

<meta charset="UTF-8">

<style>
    body { margin:0; overflow:hidden; background:#11161b; color:#d7dde3; font-family:'Segoe UI',sans-serif; user-select:none; }

    #skill-check-container { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:168px; height:168px; display:none; border-radius:50%; border:6px solid rgba(255,255,255,.18); background:radial-gradient(circle, rgba(15,19,26,.92) 0%, rgba(8,11,15,.98) 100%); box-shadow:0 0 36px rgba(0,0,0,.65); }

    #action-bar-fill { width:0%; height:100%; background:linear-gradient(90deg,#f7ff89,#e8c444); box-shadow:0 0 10px rgba(255,241,126,.8); }
    .instruction { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); text-align:center; font-size:.97rem; background:rgba(7,10,14,.82); border:1px solid rgba(255,255,255,.08); padding:10px 16px; border-radius:11px; }

<script>
(() => {
'use strict';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const fogCanvas = document.createElement('canvas');
const fogCtx = fogCanvas.getContext('2d');
const bgm = document.getElementById('bgmAudio');
bgm.volume = 0.3;

const elGenCount = document.getElementById('gen-count');
const elObjective = document.getElementById('objective');
const elHint = document.getElementById('hint-ui');
const elTerror = document.getElementById('terror-radius');
const elCdUI = document.getElementById('cooldown-ui');
const elCdTime = document.getElementById('cd-time');
const elSC = document.getElementById('skill-check-container');
const elSCNeedle = document.getElementById('sc-needle');
const elActionBar = document.getElementById('action-bar-container');
const elActionFill = document.getElementById('action-bar-fill');

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type === 'warning') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(820, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.26);
        gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.26);
        osc.start(); osc.stop(audioCtx.currentTime + 0.26);
    } else if(type === 'explosion') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(25, audioCtx.currentTime + 0.35);
        gain.gain.setValueAtTime(0.45, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
        osc.start(); osc.stop(audioCtx.currentTime + 0.35);
    } else if(type === 'heartbeat') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(55, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(36, audioCtx.currentTime + 0.18);
        gain.gain.setValueAtTime(0.58, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.18);
        osc.start(); osc.stop(audioCtx.currentTime + 0.18);
    } else if(type === 'success') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
        osc.start(); osc.stop(audioCtx.currentTime + 0.08);
    } else if(type === 'siren') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(420, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(620, audioCtx.currentTime + 1.4);
        gain.gain.setValueAtTime(0.22, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.4);
        osc.start(); osc.stop(audioCtx.currentTime + 1.4);
    }
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    fogCanvas.width = window.innerWidth;
    fogCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const WORLD_WIDTH = 3000;
const WORLD_HEIGHT = 3000;
const CAMERA_ZOOM = 1.28;
const PLAYER_START = { x: 1500, y: 1500 };
const KILLER_START = { x: 430, y: 430 };
const CENTER_CORRIDOR_HALF = 145;
const PLAYER_SAFE_RADIUS = 240;
const KILLER_SAFE_RADIUS = 240;
const GENERATOR_WORKSPACE = 120;
const LOCKER_MIN_DISTANCE = 210;

const keys = { w:false, a:false, s:false, d:false, e:false, f:false, shift:false, space:false };
let started = false;
let fPressed = false;
let spacePressed = false;
let lastFrameTime = 0;
let lastHeartbeatTime = 0;

const camera = { x: 0, y: 0 };
const obstacles = [];
const structures = [];
const vaults = [];
const generators = [];
const lockers = [];
const scratchMarks = [];
const particles = [];

const state = {
    gameOver: false,
    victory: false,
    endgame: false,
    gensFixed: 0,
    skillCheck: {
        active: false,
        angle: 0,
        speedDeg: 500,
        targetStart: 208,
        targetEnd: 286
    }
};

const player = {
    x: PLAYER_START.x,
    y: PLAYER_START.y,
    radius: 18,
    walkSpeed: 170,
    runSpeed: 295,
    walkCycle: 0,
    actionProgress: 0,
    interacting: false,
    isHiding: false,
    currentLocker: null,
    cabCooldown: 0,
    scratchTimer: 0,
    repairNoiseTimer: 0,
    vaultAction: null
};

const killer = {
    x: KILLER_START.x,
    y: KILLER_START.y,
    radius: 24,
    speed: 340,
    angle: 0,
    state: 'patrol',
    targetX: KILLER_START.x,
    targetY: KILLER_START.y,
    targetGate: 0,
    lastSeen: null,
    suspiciousLocker: null,
    inspectTimer: 0,
    searchTimer: 0,
    vaultAction: null,
    vaultCooldown: 0,
    stuckTime: 0
};

const exitGates = [
    { x: WORLD_WIDTH / 2 - 125, y: 10, w: 250, h: 40, leverX: WORLD_WIDTH / 2, leverY: 60, progress: 0, status: 'inactive' },
    { x: WORLD_WIDTH / 2 - 125, y: WORLD_HEIGHT - 50, w: 250, h: 40, leverX: WORLD_WIDTH / 2, leverY: WORLD_HEIGHT - 70, progress: 0, status: 'inactive' }
];

const reservedRects = [
    { x: WORLD_WIDTH / 2 - CENTER_CORRIDOR_HALF, y: 0, w: CENTER_CORRIDOR_HALF * 2, h: WORLD_HEIGHT },
    { x: 0, y: WORLD_HEIGHT / 2 - CENTER_CORRIDOR_HALF, w: WORLD_WIDTH, h: CENTER_CORRIDOR_HALF * 2 },
    { x: exitGates[0].x - 180, y: 0, w: exitGates[0].w + 360, h: 260 },
    { x: exitGates[1].x - 180, y: WORLD_HEIGHT - 260, w: exitGates[1].w + 360, h: 260 },
    { x: PLAYER_START.x - 220, y: PLAYER_START.y - 220, w: 440, h: 440 },
    { x: KILLER_START.x - 220, y: KILLER_START.y - 220, w: 440, h: 440 }
];

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function angleLerp(current, target, amount) {
    let diff = target - current;
    while(diff > Math.PI) diff -= Math.PI * 2;
    while(diff < -Math.PI) diff += Math.PI * 2;
    return current + diff * amount;
}
function rectsOverlap(a, b, margin = 0) {
    return !(a.x + a.w + margin < b.x || b.x + b.w + margin < a.x || a.y + a.h + margin < b.y || b.y + b.h + margin < a.y);
}
function pointInRect(px, py, rect, margin = 0) {
    return px >= rect.x - margin && px <= rect.x + rect.w + margin && py >= rect.y - margin && py <= rect.y + rect.h + margin;
}
function circleRectOverlap(cx, cy, r, rect, margin = 0) {
    const nx = clamp(cx, rect.x - margin, rect.x + rect.w + margin);
    const ny = clamp(cy, rect.y - margin, rect.y + rect.h + margin);
    return ((cx - nx) ** 2 + (cy - ny) ** 2) <= r ** 2;
}
function structureBBox(segments) {
    const minX = Math.min(...segments.map(s => s.x));
    const minY = Math.min(...segments.map(s => s.y));
    const maxX = Math.max(...segments.map(s => s.x + s.w));
    const maxY = Math.max(...segments.map(s => s.y + s.h));
    return { x:minX, y:minY, w:maxX-minX, h:maxY-minY };
}

function buildLStructure(x, y, size, arm, orientation) {
    const t = 28;
    const segs = [];
    if(orientation === 0) {
        segs.push({ x, y, w: arm, h: t });
        segs.push({ x, y, w: t, h: size });
    } else if(orientation === 1) {
        segs.push({ x: x + size - arm, y, w: arm, h: t });
        segs.push({ x: x + size - t, y, w: t, h: size });
    } else if(orientation === 2) {
        segs.push({ x, y: y + size - t, w: arm, h: t });
        segs.push({ x, y, w: t, h: size });
    } else {
        segs.push({ x: x + size - arm, y: y + size - t, w: arm, h: t });
        segs.push({ x: x + size - t, y, w: t, h: size });
    }
    return { kind: orientation % 2 === 0 ? 'ㄱ' : 'ㄴ', bbox: structureBBox(segs), segments: segs };
}

function buildDStructure(x, y, w, h, orientation) {
    const t = 28;
    const segs = [];
    let vault;
    const inset = 72;
    if(orientation === 0) { // open bottom, window on top wall
        segs.push({ x, y, w, h:t });
        segs.push({ x, y, w:t, h });
        segs.push({ x: x + w - t, y, w:t, h });
        vault = { orientation:'horizontal', x1:x + inset, y1:y + t / 2, x2:x + w - inset, y2:y + t / 2 };
    } else if(orientation === 1) { // open top, window on bottom wall
        segs.push({ x, y: y + h - t, w, h:t });
        segs.push({ x, y, w:t, h });
        segs.push({ x: x + w - t, y, w:t, h });
        vault = { orientation:'horizontal', x1:x + inset, y1:y + h - t / 2, x2:x + w - inset, y2:y + h - t / 2 };
    } else if(orientation === 2) { // open right, window on left wall
        segs.push({ x, y, w:t, h });
        segs.push({ x, y, w, h:t });
        segs.push({ x, y: y + h - t, w, h:t });
        vault = { orientation:'vertical', x1:x + t / 2, y1:y + inset, x2:x + t / 2, y2:y + h - inset };
    } else { // open left, window on right wall
        segs.push({ x: x + w - t, y, w:t, h });
        segs.push({ x, y, w, h:t });
        segs.push({ x, y: y + h - t, w, h:t });
        vault = { orientation:'vertical', x1:x + w - t / 2, y1:y + inset, x2:x + w - t / 2, y2:y + h - inset };
    }
    vault.cx = (vault.x1 + vault.x2) / 2;
    vault.cy = (vault.y1 + vault.y2) / 2;
    vault.length = Math.hypot(vault.x2 - vault.x1, vault.y2 - vault.y1);
    return { kind:'ㄷ', bbox: structureBBox(segs), segments: segs, vault };
}

function buildStructureCandidate() {
    if(Math.random() < 0.65) {
        const size = Math.random() * 170 + 180;
        const arm = Math.random() * 120 + 140;
        return buildLStructure(Math.random() * (WORLD_WIDTH - size - 160) + 80, Math.random() * (WORLD_HEIGHT - size - 160) + 80, size, arm, Math.floor(Math.random() * 4));
    }
    const w = Math.random() * 170 + 220;
    const h = Math.random() * 170 + 220;
    return buildDStructure(Math.random() * (WORLD_WIDTH - w - 160) + 80, Math.random() * (WORLD_HEIGHT - h - 160) + 80, w, h, Math.floor(Math.random() * 4));
}

function buildLineVaultStructure(x, y, horizontal = true) {
    const thickness = 28;
    const length = horizontal ? (Math.random() * 180 + 260) : (Math.random() * 180 + 260);
    const seg = horizontal ? { x, y, w:length, h:thickness } : { x, y, w:thickness, h:length };
    const inset = 68;
    const vault = horizontal
        ? { orientation:'horizontal', x1:x + inset, y1:y + thickness / 2, x2:x + length - inset, y2:y + thickness / 2 }
        : { orientation:'vertical', x1:x + thickness / 2, y1:y + inset, x2:x + thickness / 2, y2:y + length - inset };
    vault.cx = (vault.x1 + vault.x2) / 2;
    vault.cy = (vault.y1 + vault.y2) / 2;
    vault.length = Math.hypot(vault.x2 - vault.x1, vault.y2 - vault.y1);
    return { kind:'lineVault', bbox:structureBBox([seg]), segments:[seg], vault };
}

function canPlaceAnchorLocker(candidate, linkedGenerator) {
    if(!isPointFairForSpawn(candidate.x + candidate.w / 2, candidate.y + candidate.h / 2, 44)) return false;
    for(const g of generators) {
        if(g === linkedGenerator) continue;
        if(circleRectOverlap(g.x, g.y, GENERATOR_WORKSPACE, candidate, 24)) return false;
    }
    for(const l of lockers) {
        if(Math.hypot((l.x + l.w/2) - (candidate.x + candidate.w/2), (l.y + l.h/2) - (candidate.y + candidate.h/2)) < LOCKER_MIN_DISTANCE) return false;
    }
    for(const v of vaults) {
        if(circleRectOverlap(v.cx, v.cy, 90, candidate, 20)) return false;
    }
    return true;
}

function addGeneratorLockers() {
    const angles = [0, Math.PI / 2, Math.PI, Math.PI * 1.5, Math.PI / 4, Math.PI * 0.75, Math.PI * 1.25, Math.PI * 1.75];
    for(const g of generators) {
        let placed = false;
        for(const radius of [120, 132, 146, 160]) {
            for(const angle of angles) {
                const cx = g.x + Math.cos(angle) * radius;
                const cy = g.y + Math.sin(angle) * radius;
                const candidate = { x: cx - 23, y: cy - 34, w:46, h:68 };
                if(canPlaceAnchorLocker(candidate, g)) {
                    lockers.push(candidate);
                    placed = true;
                    break;
                }
            }
            if(placed) break;
        }
    }
}

function addExtraVaultStructures(count) {
    let added = 0;
    let attempts = 0;
    while(added < count && attempts < 600) {
        attempts++;
        const horizontal = Math.random() < 0.5;
        const x = Math.random() * (WORLD_WIDTH - 520) + 80;
        const y = Math.random() * (WORLD_HEIGHT - 520) + 80;
        const candidate = buildLineVaultStructure(x, y, horizontal);
        if(!canPlaceStructure(candidate)) continue;
        structures.push(candidate);
        for(const seg of candidate.segments) obstacles.push(seg);
        vaults.push(candidate.vault);
        added++;
    }
}

function canPlaceStructure(candidate) {
    if(candidate.bbox.x < 70 || candidate.bbox.y < 70 || candidate.bbox.x + candidate.bbox.w > WORLD_WIDTH - 70 || candidate.bbox.y + candidate.bbox.h > WORLD_HEIGHT - 70) return false;
    for(const rect of reservedRects) {
        if(rectsOverlap(candidate.bbox, rect, 0)) return false;
    }
    for(const s of structures) {
        if(rectsOverlap(candidate.bbox, s.bbox, 78)) return false;
    }
    return true;
}

function canPlaceGenerator(candidate) {
    if(!isPointFairForSpawn(candidate.x, candidate.y, GENERATOR_WORKSPACE)) return false;
    for(const g of generators) {
        if(Math.hypot(candidate.x - g.x, candidate.y - g.y) < 430) return false;
    }
    for(const l of lockers) {
        if(Math.hypot(candidate.x - (l.x + l.w / 2), candidate.y - (l.y + l.h / 2)) < 190) return false;
    }
    for(const v of vaults) {
        if(Math.hypot(candidate.x - v.cx, candidate.y - v.cy) < 170) return false;
    }
    return true;
}

function canPlaceLocker(candidate) {
    if(!isPointFairForSpawn(candidate.x + candidate.w / 2, candidate.y + candidate.h / 2, 72)) return false;
    for(const g of generators) {
        if(circleRectOverlap(g.x, g.y, GENERATOR_WORKSPACE, candidate, 40)) return false;
    }
    for(const l of lockers) {
        if(Math.hypot((l.x + l.w/2) - (candidate.x + candidate.w/2), (l.y + l.h/2) - (candidate.y + candidate.h/2)) < LOCKER_MIN_DISTANCE) return false;
    }
    for(const v of vaults) {
        if(circleRectOverlap(v.cx, v.cy, 90, candidate, 20)) return false;
    }
    return true;
}

function isPointFairForSpawn(x, y, extraClearance = 0) {
    for(const rect of reservedRects) {
        if(pointInRect(x, y, rect, extraClearance)) return false;
    }
    for(const obs of obstacles) {
        if(circleRectOverlap(x, y, extraClearance, obs, 30)) return false;
    }
    return true;
}

function generateWorld() {
    let tries = 0;
    do {
        tries++;
        structures.length = 0;
        vaults.length = 0;
        obstacles.length = 0;
        generators.length = 0;
        lockers.length = 0;

        while(structures.length < 24 && tries < 5000) {
            const c = buildStructureCandidate();
            if(!canPlaceStructure(c)) continue;
            structures.push(c);
            for(const seg of c.segments) obstacles.push(seg);
            if(c.vault) vaults.push(c.vault);
        }

        let attempts = 0;
        while(generators.length < 7 && attempts < 5000) {
            attempts++;
            const c = { x: Math.random() * (WORLD_WIDTH - 500) + 250, y: Math.random() * (WORLD_HEIGHT - 500) + 250, progress:0, fixed:false };
            if(canPlaceGenerator(c)) generators.push(c);
        }

        addGeneratorLockers();

        const zones = [
            { x:120, y:120, w:1180, h:1180 },
            { x:1700, y:120, w:1180, h:1180 },
            { x:120, y:1700, w:1180, h:1180 },
            { x:1700, y:1700, w:1180, h:1180 },
            { x:1260, y:160, w:480, h:780 },
            { x:1260, y:2060, w:480, h:780 }
        ];
        attempts = 0;
        while(lockers.length < 18 && attempts < 5000) {
            attempts++;
            const zone = zones[attempts % zones.length];
            const c = { x: Math.random() * (zone.w - 90) + zone.x, y: Math.random() * (zone.h - 110) + zone.y, w:46, h:68 };
            if(canPlaceLocker(c)) lockers.push(c);
        }

        addExtraVaultStructures(2);
    } while((generators.length < 7 || lockers.length < 15 || structures.length < 20 || !ensureFairStarts()) && tries < 20);
}

function ensureFairStarts() {
    if(!isPointFairForSpawn(PLAYER_START.x, PLAYER_START.y, PLAYER_SAFE_RADIUS)) return false;
    if(!isPointFairForSpawn(KILLER_START.x, KILLER_START.y, KILLER_SAFE_RADIUS)) return false;
    return Math.hypot(PLAYER_START.x - KILLER_START.x, PLAYER_START.y - KILLER_START.y) > 1200;
}

generateWorld();
setPatrolTargetNearGenerator();

function checkCollision(px, py, radius) {
    for(const obs of obstacles) {
        let nx = px;
        let ny = py;
        if(px < obs.x) nx = obs.x; else if(px > obs.x + obs.w) nx = obs.x + obs.w;
        if(py < obs.y) ny = obs.y; else if(py > obs.y + obs.h) ny = obs.y + obs.h;
        if(((px - nx) ** 2 + (py - ny) ** 2) <= radius ** 2) return true;
    }
    return false;
}

function hasLineOfSight(x1, y1, x2, y2) {
    const dist = Math.hypot(x2 - x1, y2 - y1);
    const steps = Math.max(2, Math.ceil(dist / 18));
    for(let i = 1; i < steps; i++) {
        const t = i / steps;
        const sx = x1 + (x2 - x1) * t;
        const sy = y1 + (y2 - y1) * t;
        for(const obs of obstacles) {
            if(pointInRect(sx, sy, obs, 3)) return false;
        }
    }
    return true;
}

function distancePointToSegment(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const lenSq = dx * dx + dy * dy || 1;
    let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = clamp(t, 0, 1);
    const sx = x1 + dx * t;
    const sy = y1 + dy * t;
    return Math.hypot(px - sx, py - sy);
}

function findNearbyLocker(px, py, range = 30) {
    for(const l of lockers) {
        if(px > l.x - range && px < l.x + l.w + range && py > l.y - range && py < l.y + l.h + range) return l;
    }
    return null;
}

function findNearbyVault(px, py, range = 34) {
    let best = null;
    let bestD = range;
    for(const v of vaults) {
        const d = distancePointToSegment(px, py, v.x1, v.y1, v.x2, v.y2);
        if(d < bestD) {
            bestD = d;
            best = v;
        }
    }
    return best;
}

function getVaultTarget(vault, entity, extra) {
    if(vault.orientation === 'horizontal') {
        const dir = entity.y < vault.cy ? 1 : -1;
        return { x: clamp(entity.x, Math.min(vault.x1, vault.x2) + 10, Math.max(vault.x1, vault.x2) - 10), y: vault.cy + dir * extra };
    }
    const dir = entity.x < vault.cx ? 1 : -1;
    return { x: vault.cx + dir * extra, y: clamp(entity.y, Math.min(vault.y1, vault.y2) + 10, Math.max(vault.y1, vault.y2) - 10) };
}

function startPlayerVault(vault) {
    const target = getVaultTarget(vault, player, 78);
    player.vaultAction = { vault, startX:player.x, startY:player.y, targetX:target.x, targetY:target.y, duration:0.5, elapsed:0 };
    player.interacting = true;
}

function updatePlayerVault(dt) {
    if(!player.vaultAction) return false;
    const v = player.vaultAction;
    v.elapsed += dt;
    const t = clamp(v.elapsed / v.duration, 0, 1);
    player.x = lerp(v.startX, v.targetX, t);
    player.y = lerp(v.startY, v.targetY, t);
    player.interacting = true;
    player.actionProgress = t * 100;
    if(t >= 1) player.vaultAction = null;
    return true;
}

function canUseVaultToward(vault, entity, tx, ty) {
    if(vault.orientation === 'horizontal') return (entity.y - vault.cy) * (ty - vault.cy) < 0 && Math.abs(entity.x - vault.cx) < vault.length * 0.7;
    return (entity.x - vault.cx) * (tx - vault.cx) < 0 && Math.abs(entity.y - vault.cy) < vault.length * 0.7;
}

function startKillerVault(vault) {
    const target = getVaultTarget(vault, killer, 82);
    killer.vaultAction = { vault, startX:killer.x, startY:killer.y, targetX:target.x, targetY:target.y, duration:2.0, elapsed:0 };
    killer.vaultCooldown = 0.6;
}

function updateKillerVault(dt) {
    if(!killer.vaultAction) return false;
    const v = killer.vaultAction;
    v.elapsed += dt;
    const t = clamp(v.elapsed / v.duration, 0, 1);
    killer.x = lerp(v.startX, v.targetX, t);
    killer.y = lerp(v.startY, v.targetY, t);
    if(t >= 1) killer.vaultAction = null;
    return true;
}

function tryStartKillerVault(tx, ty) {
    if(killer.vaultAction || killer.vaultCooldown > 0) return false;
    const vault = findNearbyVault(killer.x, killer.y, 42);
    if(vault && canUseVaultToward(vault, killer, tx, ty)) {
        startKillerVault(vault);
        return true;
    }
    return false;
}

function faceTarget(entity, tx, ty, speedFactor, dt) {
    const targetAngle = Math.atan2(ty - entity.y, tx - entity.x);
    entity.angle = angleLerp(entity.angle, targetAngle, clamp(speedFactor * dt, 0, 1));
}

function setKillerInvestigate(targetX, targetY, locker = null) {
    killer.state = 'investigate';
    killer.targetX = targetX;
    killer.targetY = targetY;
    killer.lastSeen = { x:targetX, y:targetY };
    killer.suspiciousLocker = locker;
    killer.searchTimer = locker ? 3.8 : 2.2;
}

function setPatrolTargetNearGenerator() {
    const activeGenerators = generators.filter(g => !g.fixed);
    const pool = activeGenerators.length ? activeGenerators : generators;
    const randGen = pool[Math.floor(Math.random() * pool.length)] || { x:WORLD_WIDTH/2, y:WORLD_HEIGHT/2 };
    killer.targetX = randGen.x + (Math.random() - 0.5) * 170;
    killer.targetY = randGen.y + (Math.random() - 0.5) * 170;
}

function moveEntity(entity, speed, dt) {
    const dist = speed * dt;
    const tryMove = (angle, scale = 1) => {
        const nx = clamp(entity.x + Math.cos(angle) * dist * scale, entity.radius, WORLD_WIDTH - entity.radius);
        const ny = clamp(entity.y + Math.sin(angle) * dist * scale, entity.radius, WORLD_HEIGHT - entity.radius);
        if(!checkCollision(nx, ny, entity.radius)) {
            entity.x = nx;
            entity.y = ny;
            return true;
        }
        return false;
    };
    if(tryMove(entity.angle)) { entity.stuckTime = 0; return true; }
    for(const off of [0.35, -0.35, 0.7, -0.7, 1.1, -1.1, Math.PI/2, -Math.PI/2]) {
        if(tryMove(entity.angle + off, 0.92)) {
            entity.angle = angleLerp(entity.angle, entity.angle + off, 0.35);
            entity.stuckTime = 0;
            return true;
        }
    }
    entity.stuckTime += dt;
    if(entity.stuckTime > 0.25) {
        entity.angle += (Math.random() < 0.5 ? 1 : -1) * (0.8 + Math.random() * 0.8);
        entity.stuckTime = 0;
        if(entity === killer && killer.state === 'patrol') setPatrolTargetNearGenerator();
    }
    return false;
}

function startSkillCheck() {
    state.skillCheck.active = true;
    state.skillCheck.angle = 0;
    elSC.style.display = 'block';
    playSound('warning');
}
function handleSkillCheck() {
    if(state.skillCheck.angle >= state.skillCheck.targetStart && state.skillCheck.angle <= state.skillCheck.targetEnd) {
        state.skillCheck.active = false;
        elSC.style.display = 'none';
        playSound('success');
    } else {
        failSkillCheck();
    }
}
function failSkillCheck() {
    state.skillCheck.active = false;
    elSC.style.display = 'none';
    playSound('explosion');
    for(const g of generators) {
        if(!g.fixed && Math.hypot(player.x - g.x, player.y - g.y) < 74) {
            g.progress = Math.max(0, g.progress - 10);
            createExplosion(g.x, g.y, '#ff4f4f');
            setKillerInvestigate(g.x, g.y, null);
            killer.searchTimer = 3.5;
            break;
        }
    }
}

function createExplosion(x, y, color) {
    for(let i = 0; i < 28; i++) {
        particles.push({ x, y, vx:(Math.random()-0.5)*250, vy:(Math.random()-0.5)*250, life:0.8, maxLife:0.8, color });
    }
}

function updateParticles(dt) {
    for(let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if(p.life <= 0) particles.splice(i, 1);
    }
}

function updateScratchMarks(dt) {
    for(let i = scratchMarks.length - 1; i >= 0; i--) {
        scratchMarks[i].life -= dt * 0.32;
        if(scratchMarks[i].life <= 0) scratchMarks.splice(i, 1);
    }
}

function updatePlayer(dt) {
    player.interacting = false;

    if(updatePlayerVault(dt)) {
        updateCamera();
        return;
    }

    if(player.cabCooldown > 0) {
        player.cabCooldown = Math.max(0, player.cabCooldown - dt);
        elCdUI.style.display = 'block';
        elCdTime.textContent = Math.ceil(player.cabCooldown);
    } else {
        elCdUI.style.display = 'none';
    }

    if(keys.f && !fPressed && !state.skillCheck.active) {
        fPressed = true;
        if(player.isHiding) {
            const locker = player.currentLocker;
            player.isHiding = false;
            player.currentLocker = null;
            player.cabCooldown = 10;
            if(locker) {
                player.x = clamp(locker.x + locker.w + 30, player.radius, WORLD_WIDTH - player.radius);
                player.y = clamp(locker.y + locker.h / 2, player.radius, WORLD_HEIGHT - player.radius);
            }
        } else if(player.cabCooldown <= 0) {
            const locker = findNearbyLocker(player.x, player.y, 30);
            if(locker) {
                const sawBeforeHide = hasLineOfSight(killer.x, killer.y, player.x, player.y) && Math.hypot(player.x - killer.x, player.y - killer.y) < 540;
                player.isHiding = true;
                player.currentLocker = locker;
                player.x = locker.x + locker.w / 2;
                player.y = locker.y + locker.h / 2;
                if(sawBeforeHide || Math.hypot(player.x - killer.x, player.y - killer.y) < 190) {
                    setKillerInvestigate(locker.x + locker.w / 2, locker.y + locker.h / 2, locker);
                }
            }
        }
    }

    if(!player.isHiding && !player.interacting && !state.skillCheck.active) {
        let dx = 0, dy = 0;
        if(keys.w) dy -= 1;
        if(keys.s) dy += 1;
        if(keys.a) dx -= 1;
        if(keys.d) dx += 1;
        if(dx !== 0 && dy !== 0) { dx *= 0.70710678; dy *= 0.70710678; }

        const speed = keys.shift ? player.runSpeed : player.walkSpeed;
        const nx = player.x + dx * speed * dt;
        const ny = player.y + dy * speed * dt;
        if(!checkCollision(nx, player.y, player.radius)) player.x = clamp(nx, player.radius, WORLD_WIDTH - player.radius);
        if(!checkCollision(player.x, ny, player.radius)) player.y = clamp(ny, player.radius, WORLD_HEIGHT - player.radius);

        if(dx !== 0 || dy !== 0) {
            player.walkCycle += (keys.shift ? 7.5 : 4) * dt;
            if(keys.shift) {
                player.scratchTimer += dt;
                while(player.scratchTimer >= 0.06) {
                    player.scratchTimer -= 0.06;
                    scratchMarks.push({ x:player.x + (Math.random()-0.5)*22, y:player.y + (Math.random()-0.5)*22, angle:Math.atan2(dy, dx) + (Math.random()-0.5), life:1 });
                }
            } else player.scratchTimer = 0;
        } else {
            player.walkCycle = 0;
            player.scratchTimer = 0;
        }
    }

    updateCamera();
}

function updateCamera() {
    const vw = canvas.width / CAMERA_ZOOM;
    const vh = canvas.height / CAMERA_ZOOM;
    camera.x = clamp(player.x - vw / 2, 0, Math.max(0, WORLD_WIDTH - vw));
    camera.y = clamp(player.y - vh / 2, 0, Math.max(0, WORLD_HEIGHT - vh));
}

function updateHint() {
    if(player.isHiding) { elHint.style.display = 'none'; return; }
    const vault = findNearbyVault(player.x, player.y, 36);
    const locker = findNearbyLocker(player.x, player.y, 28);
    let hint = '';
    if(vault) hint = 'E를 눌러 창틀을 점프해 넘을 수 있습니다.';
    else if(locker && player.cabCooldown <= 0) hint = 'F를 눌러 캐비닛에 숨을 수 있습니다.';
    if(hint) {
        elHint.style.display = 'block';
        elHint.textContent = hint;
    } else {
        elHint.style.display = 'none';
    }
}

function updateInteractions(dt) {
    updateHint();

    if(keys.e && !state.skillCheck.active && !player.isHiding && !player.vaultAction) {
        let foundInteraction = false;
        const vault = findNearbyVault(player.x, player.y, 34);
        if(vault) {
            startPlayerVault(vault);
            foundInteraction = true;
        }

        if(!state.endgame && !foundInteraction) {
            for(const g of generators) {
                if(!g.fixed && Math.hypot(player.x - g.x, player.y - g.y) < 74) {
                    player.interacting = true;
                    foundInteraction = true;
                    g.progress = Math.min(100, g.progress + 14 * dt);
                    player.actionProgress = g.progress;
                    player.repairNoiseTimer += dt;
                    if(player.repairNoiseTimer >= 0.95) {
                        player.repairNoiseTimer = 0;
                        if(killer.state !== 'chase' && Math.hypot(killer.x - g.x, killer.y - g.y) < 900) {
                            setKillerInvestigate(g.x, g.y, null);
                            killer.searchTimer = Math.max(killer.searchTimer, 1.8);
                        }
                    }
                    if(Math.random() < 0.19 * dt) startSkillCheck();
                    if(g.progress >= 100) {
                        g.fixed = true;
                        state.gensFixed++;
                        elGenCount.textContent = String(state.gensFixed);
                        createExplosion(g.x, g.y, '#ffe95e');
                        playSound('success');
                        if(state.gensFixed >= 5) {
                            state.endgame = true;
                            elObjective.textContent = '출구(레버)를 찾아 문을 여세요!';
                            elObjective.style.color = '#ff5959';
                            playSound('siren');
                            exitGates.forEach(gate => gate.status = 'powered');
                        }
                    }
                    break;
                }
            }
        }

        if(state.endgame && !foundInteraction) {
            for(const eg of exitGates) {
                if((eg.status === 'powered' || eg.status === 'opening') && Math.hypot(player.x - eg.leverX, player.y - eg.leverY) < 62) {
                    player.interacting = true;
                    eg.status = 'opening';
                    eg.progress = Math.min(100, eg.progress + 18 * dt);
                    player.actionProgress = eg.progress;
                    if(eg.progress >= 100) {
                        eg.status = 'open';
                        playSound('success');
                        playSound('siren');
                        createExplosion(eg.x + eg.w / 2, eg.y + eg.h / 2, '#4CAF50');
                    }
                    break;
                }
            }
        }
    }

    if(player.interacting) {
        elActionBar.style.display = 'block';
        elActionFill.style.width = player.actionProgress + '%';
    } else {
        player.repairNoiseTimer = 0;
        elActionBar.style.display = 'none';
        player.actionProgress = 0;
    }

    if(state.skillCheck.active) {
        state.skillCheck.angle += state.skillCheck.speedDeg * dt;
        elSCNeedle.style.transform = `rotate(${state.skillCheck.angle}deg)`;
        if(state.skillCheck.angle >= 360) failSkillCheck();
    }

    for(const eg of exitGates) {
        if(eg.status === 'open' && player.x > eg.x && player.x < eg.x + eg.w && player.y > eg.y - 24 && player.y < eg.y + eg.h + 24) {
            state.victory = true;
        }
    }
}

function updateKiller(dt) {
    if(killer.vaultCooldown > 0) killer.vaultCooldown = Math.max(0, killer.vaultCooldown - dt);

    const distToPlayer = Math.hypot(player.x - killer.x, player.y - killer.y);
    const canSeePlayer = !player.isHiding && hasLineOfSight(killer.x, killer.y, player.x, player.y);
    const angleToPlayer = Math.atan2(player.y - killer.y, player.x - killer.x);
    let angleDiff = Math.abs(killer.angle - angleToPlayer);
    if(angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;
    const inSight = canSeePlayer && distToPlayer < 460 && angleDiff < Math.PI / 4;
    const inProximity = !player.isHiding && distToPlayer < 120;

    if(distToPlayer < 1350) {
        elTerror.style.opacity = 1 - (distToPlayer / 1350);
        const now = performance.now();
        const beatInterval = Math.max(190, distToPlayer * 1.05);
        if(now - lastHeartbeatTime > beatInterval) {
            playSound('heartbeat');
            lastHeartbeatTime = now;
        }
    } else elTerror.style.opacity = 0;

    if(updateKillerVault(dt)) {
        if(!player.isHiding && Math.hypot(player.x - killer.x, player.y - killer.y) < player.radius + killer.radius) state.gameOver = true;
        return;
    }

    let foundScratch = false;
    if(killer.state !== 'chase' && !player.isHiding) {
        let closest = null;
        let minD = 380;
        for(const mark of scratchMarks) {
            const d = Math.hypot(mark.x - killer.x, mark.y - killer.y);
            if(d < minD && hasLineOfSight(killer.x, killer.y, mark.x, mark.y)) {
                minD = d;
                closest = mark;
            }
        }
        if(closest) {
            foundScratch = true;
            setKillerInvestigate(closest.x, closest.y, null);
        }
    }

    if(inSight || inProximity) {
        killer.state = 'chase';
        killer.lastSeen = { x:player.x, y:player.y };
        killer.suspiciousLocker = player.isHiding ? player.currentLocker : null;
    }

    if(killer.state === 'chase') {
        if(!player.isHiding) killer.lastSeen = { x:player.x, y:player.y };
        const tx = (!player.isHiding || !killer.lastSeen) ? player.x : killer.lastSeen.x;
        const ty = (!player.isHiding || !killer.lastSeen) ? player.y : killer.lastSeen.y;
        if(!tryStartKillerVault(tx, ty)) {
            faceTarget(killer, tx, ty, 8, dt);
            moveEntity(killer, killer.speed * 1.0864, dt);
        }
        if((player.isHiding || !inSight) && killer.lastSeen && Math.hypot(killer.lastSeen.x - killer.x, killer.lastSeen.y - killer.y) < 60) {
            killer.state = 'investigate';
            killer.targetX = killer.lastSeen.x;
            killer.targetY = killer.lastSeen.y;
            killer.searchTimer = killer.suspiciousLocker ? 3.0 : 1.6;
        }
        if(!player.isHiding && distToPlayer > 780 && !inSight) {
            killer.state = 'investigate';
            killer.targetX = player.x;
            killer.targetY = player.y;
            killer.searchTimer = 1.4;
        }
    } else if(killer.state === 'investigate') {
        if(!tryStartKillerVault(killer.targetX, killer.targetY)) {
            faceTarget(killer, killer.targetX, killer.targetY, 7, dt);
            moveEntity(killer, killer.speed * 1.06, dt);
        }
        if(Math.hypot(killer.targetX - killer.x, killer.targetY - killer.y) < 42) {
            if(killer.suspiciousLocker && Math.hypot((killer.suspiciousLocker.x + killer.suspiciousLocker.w / 2) - killer.x, (killer.suspiciousLocker.y + killer.suspiciousLocker.h / 2) - killer.y) < 70) {
                killer.state = 'inspectLocker';
                killer.inspectTimer = 1.0;
            } else {
                killer.searchTimer -= dt;
                if(killer.searchTimer <= 0) {
                    killer.suspiciousLocker = null;
                    killer.lastSeen = null;
                    killer.state = 'patrol';
                    setPatrolTargetNearGenerator();
                }
            }
        }
    } else if(killer.state === 'inspectLocker') {
        if(killer.suspiciousLocker) faceTarget(killer, killer.suspiciousLocker.x + killer.suspiciousLocker.w / 2, killer.suspiciousLocker.y + killer.suspiciousLocker.h / 2, 10, dt);
        killer.inspectTimer -= dt;
        if(killer.inspectTimer <= 0) {
            if(player.isHiding && player.currentLocker === killer.suspiciousLocker) state.gameOver = true;
            else {
                killer.suspiciousLocker = null;
                killer.lastSeen = null;
                killer.state = 'patrol';
                setPatrolTargetNearGenerator();
            }
        }
    } else {
        if(state.endgame) {
            const gate = exitGates[killer.targetGate];
            const tx = gate.x + gate.w / 2;
            const ty = gate.y + 100;
            if(Math.hypot(tx - killer.x, ty - killer.y) < 50) killer.targetGate = killer.targetGate === 0 ? 1 : 0;
            if(!tryStartKillerVault(tx, ty)) {
                faceTarget(killer, tx, ty, 4.3, dt);
                moveEntity(killer, killer.speed * 0.86, dt);
            }
        } else {
            if(Math.hypot(killer.targetX - killer.x, killer.targetY - killer.y) < 60) setPatrolTargetNearGenerator();
            if(!tryStartKillerVault(killer.targetX, killer.targetY)) {
                faceTarget(killer, killer.targetX, killer.targetY, 4.0, dt);
                moveEntity(killer, killer.speed * 0.92, dt);
            }
        }
        if(!foundScratch) killer.state = 'patrol';
    }

    if(!player.isHiding && Math.hypot(player.x - killer.x, player.y - killer.y) < player.radius + killer.radius) {
        state.gameOver = true;
    }
}

function update(dt) {
    if(state.gameOver || state.victory) return;
    updatePlayer(dt);
    updateScratchMarks(dt);
    updateInteractions(dt);
    updateKiller(dt);
    updateParticles(dt);
}

function drawFloor() {
    ctx.fillStyle = '#596068';
    ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
    for(let y = 0; y < WORLD_HEIGHT; y += 96) {
        for(let x = 0; x < WORLD_WIDTH; x += 96) {
            ctx.fillStyle = ((x / 96 + y / 96) % 2 === 0) ? '#666e77' : '#565e68';
            ctx.fillRect(x, y, 96, 96);
        }
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.045)';
    ctx.lineWidth = 2;
    for(let x = 0; x < WORLD_WIDTH; x += 96) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_HEIGHT); ctx.stroke();
    }
    for(let y = 0; y < WORLD_HEIGHT; y += 96) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WORLD_WIDTH, y); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(10, 12, 16, 0.18)';
    for(let i = 0; i < 24; i++) {
        const x = (i * 127) % WORLD_WIDTH;
        const y = (i * 189) % WORLD_HEIGHT;
        ctx.beginPath();
        ctx.ellipse(x + 80, y + 40, 52, 24, 0.6, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawStructures() {
    for(const obs of obstacles) {
        ctx.fillStyle = '#59636c';
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(obs.x + 3, obs.y + 3, obs.w - 6, Math.max(4, obs.h * 0.18));
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        ctx.fillRect(obs.x + obs.w - 6, obs.y + 4, 6, obs.h - 8);
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(obs.x + 4, obs.y + obs.h - 6, obs.w - 8, 6);
        ctx.strokeStyle = '#39434c';
        ctx.lineWidth = 2;
        ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
    }

    for(const v of vaults) {
        ctx.save();
        ctx.strokeStyle = '#6b2d00';
        ctx.fillStyle = '#ff8c1a';
        if(v.orientation === 'horizontal') {
            const left = Math.min(v.x1, v.x2);
            const width = Math.abs(v.x2 - v.x1);
            ctx.fillRect(left, v.y1 - 6, width, 12);
            ctx.strokeRect(left, v.y1 - 6, width, 12);
            ctx.strokeStyle = '#ffd08a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(left + 8, v.y1);
            ctx.lineTo(left + width - 8, v.y1);
            ctx.stroke();
        } else {
            const top = Math.min(v.y1, v.y2);
            const height = Math.abs(v.y2 - v.y1);
            ctx.fillRect(v.x1 - 6, top, 12, height);
            ctx.strokeRect(v.x1 - 6, top, 12, height);
            ctx.strokeStyle = '#ffd08a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(v.x1, top + 8);
            ctx.lineTo(v.x1, top + height - 8);
            ctx.stroke();
        }
        ctx.restore();
    }
}

function drawExitGates() {
    for(const eg of exitGates) {
        ctx.fillStyle = '#252a30';
        ctx.fillRect(eg.x, eg.y, eg.w, eg.h);
        ctx.strokeStyle = '#0d1014';
        ctx.lineWidth = 4;
        ctx.strokeRect(eg.x, eg.y, eg.w, eg.h);
        const lightColor = eg.status === 'inactive' ? '#58606a' : (eg.status === 'open' ? '#4cff90' : '#ff5b5b');
        ctx.fillStyle = lightColor;
        ctx.fillRect(eg.x + eg.w / 2 - 40, eg.y + eg.h / 2 - 10, 80, 20);
        if(eg.status === 'open') {
            ctx.fillStyle = 'rgba(76,255,144,0.18)';
            ctx.fillRect(eg.x, eg.y - 18, eg.w, eg.h + 36);
        }
        ctx.fillStyle = '#49525b';
        ctx.fillRect(eg.leverX - 10, eg.leverY - 10, 20, 20);
        ctx.fillStyle = lightColor;
        ctx.beginPath(); ctx.arc(eg.leverX, eg.leverY, 5, 0, Math.PI * 2); ctx.fill();
    }
}

function drawLockers() {
    for(const l of lockers) {
        ctx.fillStyle = '#7e1f1f';
        ctx.fillRect(l.x, l.y, l.w, l.h);
        ctx.fillStyle = '#a22b2b';
        ctx.fillRect(l.x + 3, l.y + 3, l.w - 6, l.h - 6);
        ctx.strokeStyle = '#451010';
        ctx.lineWidth = 3;
        ctx.strokeRect(l.x, l.y, l.w, l.h);
        ctx.fillStyle = '#5e1111';
        ctx.fillRect(l.x + l.w / 2 - 2, l.y + 10, 4, l.h - 20);
        ctx.fillStyle = '#d7d7d7';
        ctx.fillRect(l.x + 8, l.y + 8, l.w - 16, 7);
        if(killer.state === 'inspectLocker' && killer.suspiciousLocker === l) {
            ctx.strokeStyle = 'rgba(255,255,255,0.68)';
            ctx.lineWidth = 2;
            ctx.strokeRect(l.x - 4, l.y - 4, l.w + 8, l.h + 8);
        }
    }
}

function drawGenerators() {
    for(const g of generators) {
        ctx.save();
        ctx.translate(g.x, g.y);
        ctx.fillStyle = '#55606a';
        ctx.fillRect(-30, -25, 60, 50);
        ctx.fillStyle = g.fixed ? '#86929d' : '#3f4a54';
        ctx.fillRect(-20, -15, 40, 30);
        ctx.fillStyle = '#b8860b';
        ctx.fillRect(-25, 5, 10, 20);
        ctx.fillRect(15, 5, 10, 20);
        ctx.fillStyle = '#111';
        ctx.fillRect(-15, -35, 30, 10);
        const lightsOn = g.fixed ? 4 : Math.floor((g.progress / 100) * 4);
        for(let i = 0; i < 4; i++) {
            ctx.fillStyle = i < lightsOn ? '#ffeb3b' : '#000';
            ctx.beginPath(); ctx.arc(-9 + i * 6, -30, 2.5, 0, Math.PI * 2); ctx.fill();
        }
        if(!g.fixed && g.progress > 0) {
            const y = Math.sin(performance.now() / 100) * 3;
            ctx.fillStyle = '#9ba5af';
            ctx.fillRect(-10, -15 + y, 20, 10);
        }
        ctx.restore();
    }
}

function drawParticles() {
    for(const p of particles) {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function drawScratchMarks() {
    for(const sm of scratchMarks) {
        ctx.strokeStyle = `rgba(255, 90, 30, ${sm.life})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(sm.x - Math.cos(sm.angle) * 6, sm.y - Math.sin(sm.angle) * 6);
        ctx.lineTo(sm.x + Math.cos(sm.angle) * 6, sm.y + Math.sin(sm.angle) * 6);
        ctx.stroke();
    }
}

function drawKiller() {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(killer.x, killer.y, killer.radius * 1.6, killer.radius * 1.1, killer.angle, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0f0f0f';
    ctx.beginPath(); ctx.arc(killer.x, killer.y, killer.radius * 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#8b0000';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(killer.x, killer.y);
    ctx.lineTo(killer.x + Math.cos(killer.angle + Math.PI / 3) * 45, killer.y + Math.sin(killer.angle + Math.PI / 3) * 45);
    ctx.stroke();
    ctx.fillStyle = '#ff0000';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(killer.x + Math.cos(killer.angle) * 14 - Math.sin(killer.angle) * 7, killer.y + Math.sin(killer.angle) * 14 + Math.cos(killer.angle) * 7, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(killer.x + Math.cos(killer.angle) * 14 + Math.sin(killer.angle) * 7, killer.y + Math.sin(killer.angle) * 14 - Math.cos(killer.angle) * 7, 3, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
}

function drawPlayer() {
    if(player.isHiding) return;
    const bob = Math.sin(player.walkCycle) * (keys.shift ? 4 : 2);
    ctx.fillStyle = '#49515b';
    ctx.fillRect(player.x - 12, player.y + bob + 5, 24, 15);
    ctx.fillStyle = '#244a6b';
    ctx.beginPath(); ctx.arc(player.x, player.y + bob, player.radius, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e0e0e0';
    ctx.beginPath(); ctx.arc(player.x - 12, player.y + bob, player.radius * 0.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(player.x + 12, player.y + bob, player.radius * 0.4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#f5d0b5';
    ctx.beginPath(); ctx.arc(player.x, player.y + bob - 5, player.radius * 0.6, 0, Math.PI * 2); ctx.fill();
}

function drawFog() {
    fogCtx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
    fogCtx.fillStyle = 'rgba(0, 0, 0, 0.96)';
    fogCtx.fillRect(0, 0, fogCanvas.width, fogCanvas.height);
    fogCtx.globalCompositeOperation = 'destination-out';

    const pRadius = player.isHiding ? 120 : 410;
    const innerRadius = player.isHiding ? 14 : 24;
    const grad = fogCtx.createRadialGradient(canvas.width / 2, canvas.height / 2, innerRadius, canvas.width / 2, canvas.height / 2, pRadius);
    grad.addColorStop(0, 'rgba(255,255,255,1)');
    grad.addColorStop(0.45, 'rgba(255,255,255,0.98)');
    grad.addColorStop(0.72, 'rgba(255,255,255,0.62)');
    grad.addColorStop(0.90, 'rgba(255,255,255,0.18)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    fogCtx.fillStyle = grad;
    fogCtx.beginPath();
    fogCtx.arc(canvas.width / 2, canvas.height / 2, pRadius, 0, Math.PI * 2);
    fogCtx.fill();

    for(const eg of exitGates) {
        const sx = ((eg.x + eg.w / 2) - camera.x) * CAMERA_ZOOM;
        const sy = ((eg.y + eg.h / 2) - camera.y) * CAMERA_ZOOM;
        const dg = fogCtx.createRadialGradient(sx, sy, 60, sx, sy, 410);
        dg.addColorStop(0, 'rgba(255,255,255,0.7)');
        dg.addColorStop(1, 'rgba(255,255,255,0)');
        fogCtx.fillStyle = dg;
        fogCtx.beginPath();
        fogCtx.arc(sx, sy, 350, 0, Math.PI * 2);
        fogCtx.fill();
    }

    for(const g of generators) {
        if(!g.fixed) continue;
        const sx = (g.x - camera.x) * CAMERA_ZOOM;
        const sy = (g.y - camera.y) * CAMERA_ZOOM;
        const gg = fogCtx.createRadialGradient(sx, sy, 40, sx, sy, 280);
        gg.addColorStop(0, 'rgba(255,255,255,1)');
        gg.addColorStop(1, 'rgba(255,255,255,0)');
        fogCtx.fillStyle = gg;
        fogCtx.beginPath();
        fogCtx.arc(sx, sy, 240, 0, Math.PI * 2);
        fogCtx.fill();
    }

    const kx = (killer.x - camera.x) * CAMERA_ZOOM;
    const ky = (killer.y - camera.y) * CAMERA_ZOOM;
    fogCtx.globalCompositeOperation = 'source-over';
    const stain = fogCtx.createRadialGradient(kx, ky, 14, kx, ky, 520);
    stain.addColorStop(0, 'rgba(255,0,0,0.38)');
    stain.addColorStop(1, 'rgba(255,0,0,0)');
    fogCtx.fillStyle = stain;
    fogCtx.beginPath();
    fogCtx.moveTo(kx, ky);
    fogCtx.arc(kx, ky, 520, killer.angle - Math.PI / 4, killer.angle + Math.PI / 4);
    fogCtx.lineTo(kx, ky);
    fogCtx.fill();

    fogCtx.globalCompositeOperation = 'source-over';
    const vignette = fogCtx.createRadialGradient(canvas.width / 2, canvas.height / 2, pRadius * 0.58, canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.82);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(0.62, 'rgba(0,0,0,0.08)');
    vignette.addColorStop(0.82, 'rgba(0,0,0,0.36)');
    vignette.addColorStop(1, player.isHiding ? 'rgba(0,0,0,0.78)' : 'rgba(0,0,0,0.64)');
    fogCtx.fillStyle = vignette;
    fogCtx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.drawImage(fogCanvas, 0, 0);
}

function draw() {
    ctx.fillStyle = '#42474d';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.scale(CAMERA_ZOOM, CAMERA_ZOOM);
    ctx.translate(-camera.x, -camera.y);
    drawFloor();
    drawScratchMarks();
    drawStructures();
    drawExitGates();
    drawLockers();
    drawGenerators();
    drawParticles();
    drawKiller();
    drawPlayer();
    ctx.restore();
    drawFog();

    if(player.isHiding) {
        ctx.fillStyle = '#ffeb3b';
        ctx.font = 'bold 24px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('[ F ] 키를 눌러 밖으로 나가세요', canvas.width / 2, canvas.height - 150);
    }
    if(state.gameOver || state.victory) {
        ctx.fillStyle = 'rgba(0,0,0,0.88)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = state.victory ? '#4cff90' : '#ff4d4d';
        ctx.font = 'bold 48px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText(state.victory ? '성공적으로 탈출했습니다! (졸업 확정)' : '재수강 확정... 교수님께 잡혔습니다.', canvas.width / 2, canvas.height / 2);
        ctx.font = '20px Segoe UI';
        ctx.fillStyle = '#d3d3d3';
        ctx.fillText('새로고침(F5)하여 다시 시작', canvas.width / 2, canvas.height / 2 + 46);
    }
}

function loop(ts) {
    if(!lastFrameTime) lastFrameTime = ts;
    const dt = Math.min(0.033, (ts - lastFrameTime) / 1000);
    lastFrameTime = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
}

function startGameOnce() {
    if(started) return;
    started = true;
    if(audioCtx.state === 'suspended') audioCtx.resume();
    bgm.play().catch(() => {});
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
    const key = e.key.toLowerCase();
    if(Object.prototype.hasOwnProperty.call(keys, key)) keys[key] = true;
    if(e.key === 'Shift') keys.shift = true;
    if(e.code === 'Space') {
        keys.space = true;
        if(!spacePressed && state.skillCheck.active) handleSkillCheck();
        spacePressed = true;
    }
    startGameOnce();
});
window.addEventListener('keyup', e => {
    const key = e.key.toLowerCase();
    if(Object.prototype.hasOwnProperty.call(keys, key)) keys[key] = false;
    if(e.key === 'Shift') keys.shift = false;
    if(e.code === 'Space') { keys.space = false; spacePressed = false; }
    if(key === 'f') fPressed = false;
});
window.addEventListener('pointerdown', () => { if(audioCtx.state === 'suspended') audioCtx.resume(); startGameOnce(); });

ctx.fillStyle = '#11161b';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.fillStyle = '#edf2f7';
ctx.font = '24px Segoe UI';
ctx.textAlign = 'center';
ctx.fillText('화면을 클릭하거나 아무 키나 누르면 시작됩니다!', canvas.width / 2, canvas.height / 2);

})();
</script>
</body>
</html>
